site_name: Rewrap
site_url: https://dnut.github.io/Rewrap/
repo_url: https://github.com/dnut/rewrap
site_dir: .obj/docsite
strict: true
theme:
  name: material
  language: en
  font:
    text: Nunito
    code: JetBrains Mono
  features:
    - toc.integrate
    - content.tabs.link
  favicon: images/logo.svg
  logo: images/logo.svg
  icon: null
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
extra_css:
  - extra.css
plugins:
  - search:
      separator: '[\s\-\.]+'
markdown_extensions:
  - admonition
  - pymdownx.extra
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
nav:
  - "Getting Started": README.md
  - configuration.md
  - configuration-visual-studio.md
  - prerelease-versions.md
  - extra-features.md
  - "Contributing": CONTRIBUTING.md
  - "Specs":
      - specs/README.md
      - "Features":
          - specs/features/line-comments.md
          - specs/features/block-comments.md
          - specs/features/decoration-lines.md
          - specs/features/selections.md
          - specs/features/embedded-sections.md
