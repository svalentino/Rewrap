name: Release

on:
    push:
        tags:
            - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
    contents: write

jobs:
    release:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
            - uses: cachix/install-nix-action@v27
            - run: nix develop -c ./do package
            - run: nix develop -c ./do release-notes ${GITHUB_REF_NAME#v}
            - uses: softprops/action-gh-release@v2
              with:
                  body_path: release-notes.md
                  files: .obj/*.vsix
