name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      - uses: cachix/install-nix-action@v27
      - run: nix develop -c ./do package
      - run: nix develop -c ./do release-notes ${GITHUB_REF_NAME#v}

      - name: Read release channel from tag annotation
        id: channel
        run: |
          tag_message="$(git tag -l "$GITHUB_REF_NAME" --format='%(contents)')"

          if grep -qi '\bstable\b' <<< "$tag_message"; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          elif grep -Eqi '\bpre[- ]?release\b' <<< "$tag_message"; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag annotation must contain 'stable' or 'prerelease'." >&2
            exit 1
          fi

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: .obj/*.vsix
          prerelease: ${{ steps.channel.outputs.prerelease }}
